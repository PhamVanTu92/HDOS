# ─── Host Nginx Config cho HDOS ──────────────────────────────────────────────
#
# File này cài trên MÁY CHỦ (không phải trong Docker).
# Host nginx nhận HTTPS từ internet, terminate SSL, proxy vào Docker containers.
#
# Cài đặt:
#   sudo cp nginx/hdos-host.conf /etc/nginx/sites-available/hdosfoxai
#   sudo ln -s /etc/nginx/sites-available/hdosfoxai /etc/nginx/sites-enabled/hdosfoxai
#   sudo nginx -t && sudo systemctl reload nginx
#
# Lấy cert Let's Encrypt (sau khi DNS đã trỏ về server):
#   sudo certbot --nginx -d hdosfoxai.foxai.com.vn
#
# Tự động gia hạn cert (kiểm tra cron):
#   sudo certbot renew --dry-run

# ── HTTP → HTTPS redirect + ACME challenge ────────────────────────────────────
server {
    listen 80;
    server_name hdosfoxai.foxai.com.vn;

    # Let's Encrypt ACME challenge (certbot tự quản lý)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect tất cả HTTP sang HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS — Main App (Frontend + API + Keycloak OIDC) ────────────────────────
server {
    listen 443 ssl;
    server_name hdosfoxai.foxai.com.vn;

    # Cert Let's Encrypt (certbot tự điền sau khi chạy certbot --nginx)
    ssl_certificate     /etc/letsencrypt/live/hdosfoxai.foxai.com.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hdosfoxai.foxai.com.vn/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    # Proxy vào HDOS tls-proxy container (HTTP, localhost only)
    location / {
        proxy_pass         http://127.0.0.1:17080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;  # ← quan trọng: báo cho Keycloak biết đây là HTTPS
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # SignalR WebSocket — cần Upgrade header
    location /hubs/ {
        proxy_pass          http://127.0.0.1:17080;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_set_header    X-Forwarded-Proto https;
        proxy_read_timeout  3600s;   # WebSocket cần timeout dài
    }
}

# ── HTTPS — Keycloak Admin Console ───────────────────────────────────────────
server {
    listen 8443 ssl;
    server_name hdosfoxai.foxai.com.vn;

    ssl_certificate     /etc/letsencrypt/live/hdosfoxai.foxai.com.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hdosfoxai.foxai.com.vn/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass          http://127.0.0.1:17081;
        proxy_http_version  1.1;
        proxy_set_header    Host              $http_host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto https;
        proxy_buffer_size   128k;
        proxy_buffers       4 256k;
        proxy_busy_buffers_size 256k;
    }
}
