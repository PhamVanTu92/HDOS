events {
    worker_connections 1024;
}

http {
    # Docker internal DNS — resolve upstreams lúc request (không phải lúc start)
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Tất cả traffic đến đây đã qua SSL termination ở host nginx.
    # Không có SSL ở đây — host nginx chịu trách nhiệm TLS.
    # X-Forwarded-Proto: https được host nginx gắn vào, ta chỉ cần pass through.

    # ── Port 80: Frontend + Gateway + Keycloak OIDC ──────────────────────────
    server {
        listen 80;

        # Keycloak OIDC — /realms/ và static resources /resources/
        location /realms/ {
            set $kc http://keycloak:8080;
            proxy_pass          $kc;
            proxy_set_header    Host              $http_host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_buffer_size   128k;
            proxy_buffers       4 256k;
        }

        location /resources/ {
            set $kc http://keycloak:8080;
            proxy_pass          $kc;
            proxy_set_header    Host              $http_host;
            proxy_set_header    X-Forwarded-Proto $http_x_forwarded_proto;
        }

        # Gateway — REST API
        location /api/ {
            set $gw http://gateway:5500;
            proxy_pass         $gw;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
        }

        # Gateway — SignalR WebSocket
        location /hubs/ {
            set $gw http://gateway:5500;
            proxy_pass          $gw;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade    $http_upgrade;
            proxy_set_header    Connection "upgrade";
            proxy_set_header    Host       $host;
            proxy_read_timeout  3600s;
        }

        # Gateway — SSE (Server-Sent Events)
        # Must be an explicit block — SSE CANNOT fall into the SPA catch-all.
        # proxy_buffering off is mandatory; EventSource needs a persistent stream,
        # not a buffered response. X-Accel-Buffering: no from the gateway also
        # tells nginx to disable buffering, but the directive here is definitive.
        location /sse/ {
            set $gw http://gateway:5500;
            proxy_pass          $gw;
            proxy_http_version  1.1;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_set_header    Connection        '';       # no upgrade, no close
            proxy_buffering     off;
            proxy_cache         off;
            proxy_read_timeout  3600s;
            chunked_transfer_encoding on;
        }

        # Gateway — JWKS (anonymous)
        location /.well-known/ {
            set $gw http://gateway:5500;
            proxy_pass         $gw;
            proxy_set_header   Host $host;
        }

        # Frontend SPA — catch-all
        location / {
            set $fe http://frontend:3000;
            proxy_pass         $fe;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
        }
    }

    # ── Port 8080: Keycloak Admin Console ────────────────────────────────────
    server {
        listen 8080;

        location / {
            set $kc http://keycloak:8080;
            proxy_pass          $kc;
            proxy_set_header    Host              $http_host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_buffer_size   128k;
            proxy_buffers       4 256k;
            proxy_busy_buffers_size 256k;
        }
    }
}
