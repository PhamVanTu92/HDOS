events {
    worker_connections 1024;
}

http {
    # Docker internal DNS — resolve upstreams lúc request (không phải lúc start)
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── Port 443: Frontend + Gateway + Keycloak OIDC (tất cả trên 1 port) ────
    server {
        listen 443 ssl;
        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Keycloak — OIDC endpoints (/realms/) và static assets (/resources/)
        # Phải đặt TRƯỚC location / để có priority cao hơn
        location /realms/ {
            set $kc http://keycloak:8080;
            proxy_pass          $kc/realms/;
            proxy_set_header    Host              $http_host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto https;
            proxy_buffer_size   128k;
            proxy_buffers       4 256k;
        }

        location /resources/ {
            set $kc http://keycloak:8080;
            proxy_pass          $kc/resources/;
            proxy_set_header    Host              $http_host;
            proxy_set_header    X-Forwarded-Proto https;
        }

        # Gateway — REST API
        location /api/ {
            set $upstream http://gateway:5500;
            proxy_pass         $upstream/api/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
        }

        # Gateway — SignalR WebSocket
        location /hubs/ {
            set $upstream http://gateway:5500;
            proxy_pass          $upstream/hubs/;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade    $http_upgrade;
            proxy_set_header    Connection "upgrade";
            proxy_set_header    Host       $host;
            proxy_read_timeout  3600s;
        }

        # Frontend SPA — catch-all
        location / {
            set $upstream http://frontend:3000;
            proxy_pass         $upstream;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Forwarded-Proto https;
        }
    }

    # ── Port 8443: Keycloak Admin Console (optional) ──────────────────────────
    server {
        listen 8443 ssl;
        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            set $kc http://keycloak:8080;
            proxy_pass          $kc;
            proxy_set_header    Host              $http_host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto https;
            proxy_buffer_size   128k;
            proxy_buffers       4 256k;
            proxy_busy_buffers_size 256k;
        }
    }
}
