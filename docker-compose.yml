# ReportingPlatform — full-stack compose
# Usage: docker compose up -d
# Providers overlay: docker compose -f docker-compose.yml -f docker-compose.providers.yml up -d
#
# Port map (host → container):
#    443 → tls-proxy        (HTTPS frontend + gateway — public entry point)
#   8443 → tls-proxy        (HTTPS Keycloak)
#   5500 → gateway          (HTTP — internal, tls-proxy → gateway)
#   5000 → request-api      (internal)
#   5100 → ingestion-api    (internal)
#   5200 → realtime-hub     (internal)
#   5400 → provider-bridge  (gRPC — internal)
#   5433 → postgres         (HDOS main DB)
#   6380 → redis
#   5672 → rabbitmq (AMQP)
#  15672 → rabbitmq (management UI)
#   8180 → keycloak         (HTTP — internal, tls-proxy → keycloak on 8443)
#   3000 → frontend         (HTTP — internal, tls-proxy → frontend on 443)
#
# Excel Provider stack chạy riêng: https://github.com/PhamVanTu92/excel-provider
#
# First-time setup:
#   1. Copy .env.example → .env and fill in HDOS_HOST (your server IP/hostname)
#   2. docker compose up -d
#
# Truy cập:
#   Frontend : https://<HDOS_HOST>          (accept self-signed cert warning)
#   Keycloak : https://<HDOS_HOST>:8443     (admin: admin / Admin123!)

services:

  # ─── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       hdos
      POSTGRES_USER:     hdos
      POSTGRES_PASSWORD: hdos
    ports:
      - "5433:5432"   # host 5433 → container 5432 (tránh xung đột với Postgres local)
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/Migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hdos -d hdos"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - platform

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6380:6379"   # host 6380 → container 6379 (tránh xung đột với Redis local)
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - platform

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - platform

  # ─── Auth: Keycloak (identity provider) ──────────────────────────────────────
  #
  # HDOS_HOST must be set in .env to the IP/hostname reachable from BOTH:
  #   • Docker containers (via host networking)
  #   • User browsers
  # Example: HDOS_HOST=192.168.1.100   (server LAN IP)
  #
  # Admin UI (HTTPS): https://<HDOS_HOST>:8443   login: admin / Admin123!

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN:          admin
      KEYCLOAK_ADMIN_PASSWORD: Admin123!
      KC_HOSTNAME:             "${HDOS_HOST:-localhost}"
      KC_HOSTNAME_PORT:        "8443"
      KC_HOSTNAME_STRICT:      "false"
      KC_HTTP_ENABLED:         "true"
      KC_HEALTH_ENABLED:       "true"
      # KC_PROXY=edge — Keycloak biết nó đứng sau nginx HTTPS proxy
      KC_PROXY:                "edge"
    ports:
      - "8180:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak/realm-import.json:/opt/keycloak/data/import/realm-import.json:ro
    healthcheck:
      # management port 9000, path /health/ready → {"status":"UP"}
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/health/ready | grep -q UP || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - platform

  # ─── TLS Proxy (nginx — HTTPS termination) ───────────────────────────────────
  #
  # Sinh self-signed cert tự động lần đầu chạy (lưu vào volume tls_certs).
  # Port 443  : frontend SPA + gateway API/hubs
  # Port 8443 : Keycloak OIDC + Admin UI

  tls-proxy:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    volumes:
      - ./nginx/tls-proxy.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "443:443"
      - "8443:8443"
    restart: unless-stopped
    networks:
      - platform

  # ─── Phase 11: Gateway (public ingress) ──────────────────────────────────────

  gateway:
    build:
      context: .
      dockerfile: Services/Gateway/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS:        http://+:5500
      Auth__Authority:        "${AUTH_AUTHORITY:-http://keycloak:8080/realms/hdos}"
      Auth__Audience:         "${AUTH_AUDIENCE:-reporting-platform}"
      # CORS: trình duyệt gọi qua tls-proxy (https://IP), cần cho phép origin đó
      Cors__AllowedOrigins__0: "${CORS_ORIGIN_0:-https://${HDOS_HOST:-localhost}}"
      Cors__AllowedOrigins__1: "${CORS_ORIGIN_1:-https://localhost}"
      Cors__AllowedOrigins__2: "${CORS_ORIGIN_2:-http://localhost:5173}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "5500:5500"
    depends_on:
      request-api:
        condition: service_healthy
      ingestion-api:
        condition: service_started
      realtime-hub:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5500/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - platform

  # ─── Core: Request API ───────────────────────────────────────────────────────

  request-api:
    build:
      context: .
      dockerfile: Services/Request.Api/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT:   Development
      ASPNETCORE_URLS:          http://+:5000
      Redis__ConnectionString:  redis:6379
      RabbitMQ__Uri:            amqp://guest:guest@rabbitmq/
      Auth__Authority:          "${AUTH_AUTHORITY:-http://keycloak:8080/realms/hdos}"
      Auth__Audience:           "${AUTH_AUDIENCE:-reporting-platform}"
      ConnectionStrings__Postgres: "Host=postgres;Database=hdos;Username=hdos;Password=hdos"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/healthz/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - platform

  # ─── Phase 11: Ingestion API ─────────────────────────────────────────────────

  ingestion-api:
    build:
      context: .
      dockerfile: Services/Ingestion.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT:      Development
      ASPNETCORE_URLS:             http://+:5100
      Redis__ConnectionString:     redis:6379
      ConnectionStrings__RabbitMQ: amqp://guest:guest@rabbitmq/
      ConnectionStrings__Redis:    redis:6379
      Auth__Authority:             "${AUTH_AUTHORITY:-http://keycloak:8080/realms/hdos}"
      Auth__Audience:              "${AUTH_AUDIENCE:-reporting-platform}"
      ConnectionStrings__Postgres: "Host=postgres;Database=hdos;Username=hdos;Password=hdos"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "5100:5100"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5100/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - platform

  # ─── Core: Realtime Hub (SignalR) ─────────────────────────────────────────────

  realtime-hub:
    build:
      context: .
      dockerfile: Services/Realtime.Hub/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT:   Development
      ASPNETCORE_URLS:          http://+:5200
      Redis__ConnectionString:  redis:6379
      RabbitMQ__Uri:            amqp://guest:guest@rabbitmq/
      Auth__Authority:          "${AUTH_AUTHORITY:-http://keycloak:8080/realms/hdos}"
      Auth__Audience:           "${AUTH_AUDIENCE:-reporting-platform}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "5200:5200"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5200/healthz/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - platform

  # ─── Core: Provider Bridge (gRPC) ────────────────────────────────────────────

  provider-bridge:
    build:
      context: .
      dockerfile: Services/Provider.Bridge/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT:  Development
      Bridge__JwksUrl:         http://request-api:5000/.well-known/jwks.json
      Bridge__GrpcUrl:         http://provider-bridge:5400
      Redis__ConnectionString:     redis:6379
      RabbitMQ__Uri:               amqp://guest:guest@rabbitmq/
      ConnectionStrings__Postgres: "Host=postgres;Database=hdos;Username=hdos;Password=hdos"
    ports:
      - "5400:5400"
    depends_on:
      postgres:
        condition: service_healthy
      request-api:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf --http2-prior-knowledge http://localhost:5400/healthz/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - platform

  # ─── Core: Operation Router Worker ───────────────────────────────────────────

  operation-router-worker:
    build:
      context: .
      dockerfile: Services/Operation.Router.Worker/Dockerfile
    environment:
      DOTNET_ENVIRONMENT: Development
      ConnectionStrings__RabbitMQ: amqp://guest:guest@rabbitmq/
      ConnectionStrings__Postgres: "Host=postgres;Database=hdos;Username=hdos;Password=hdos"
      ConnectionStrings__Redis:    redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - platform

  # ─── Core: Response Dispatcher Worker ────────────────────────────────────────

  response-dispatcher-worker:
    build:
      context: .
      dockerfile: Services/Response.Dispatcher.Worker/Dockerfile
    environment:
      DOTNET_ENVIRONMENT:          Development
      Redis__ConnectionString:     redis:6379
      RabbitMQ__Uri:               amqp://guest:guest@rabbitmq/
      ConnectionStrings__Postgres: "Host=postgres;Database=hdos;Username=hdos;Password=hdos"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - platform

  # ─── Core: Progress Dispatcher Worker ────────────────────────────────────────

  progress-dispatcher-worker:
    build:
      context: .
      dockerfile: Services/Progress.Dispatcher.Worker/Dockerfile
    environment:
      DOTNET_ENVIRONMENT:       Development
      Redis__ConnectionString:  redis:6379
      RabbitMQ__Uri:            amqp://guest:guest@rabbitmq/
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - platform

  # ─── Phase 11: Event Processor Worker ────────────────────────────────────────

  event-processor-worker:
    build:
      context: .
      dockerfile: Services/Event.Processor.Worker/Dockerfile
    environment:
      DOTNET_ENVIRONMENT:          Development
      ConnectionStrings__Redis:    redis:6379
      ConnectionStrings__RabbitMQ: amqp://guest:guest@rabbitmq/
      ConnectionStrings__Postgres: "Host=postgres;Database=hdos;Username=hdos;Password=hdos"
      Hub__Url:                    http://realtime-hub:5200
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      realtime-hub:
        condition: service_started
    networks:
      - platform

  # ─── Note: Excel Provider stack đã tách sang repo riêng ─────────────────────
  # https://github.com/PhamVanTu92/excel-provider
  # Chạy độc lập bằng docker compose trong repo đó (postgres-excel + excel-provider + excel-provider-ui)

  # ─── Frontend: React SPA (HDOS main) ─────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # HTTPS URLs — qua tls-proxy (self-signed cert)
        VITE_KEYCLOAK_URL:       "https://${HDOS_HOST:-localhost}:8443"
        VITE_KEYCLOAK_REALM:     hdos
        VITE_KEYCLOAK_CLIENT_ID: hdos-web
        VITE_GATEWAY_URL:        "https://${HDOS_HOST:-localhost}"
    ports:
      - "3000:3000"
    depends_on:
      gateway:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - platform

# ─── Volumes & Networks ───────────────────────────────────────────────────────

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  keycloak_data:

networks:
  platform:
    name: hdos_platform
